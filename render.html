</div>

<!-- Overlay -->
<div id="overlay" onclick="closeOverlay()">
    <div id="overlay-content" onclick="event.stopPropagation()">
        <p id="overlay-text"></p>
        <img id="overlay-img">
    </div>
    <span id="overlay-close" onclick="closeOverlay()">✕</span>
    <span class="overlay-arrow" id="arrow-left"  onclick="event.stopPropagation(); changeImage(-1)">&#8592;</span>
    <span class="overlay-arrow" id="arrow-right" onclick="event.stopPropagation(); changeImage(1)">&#8594;</span>
</div>

<script src="..\JS\render_data.js"></script>
<script>
    const images = Array.from(document.querySelectorAll(".media-grid img"));
    let currentIndex = 0;

    function openOverlay(imgEl) {
        currentIndex = images.indexOf(imgEl);
        showImage(currentIndex);
        document.getElementById("overlay").style.display = "flex";
    }

    function showImage(index) {
        const imgEl = images[index];
        const filename = imgEl.src.split("/").pop()
            .replace(/%20/g, " ")
            .replace(/%5B/g, "[")
            .replace(/%5D/g, "]");
        document.getElementById("overlay-img").src = imgEl.src;
        document.getElementById("overlay-text").textContent = renderData[filename] || "";
    }

    function changeImage(direction) {
        currentIndex = (currentIndex + direction + images.length) % images.length;
        showImage(currentIndex);
    }

    function closeOverlay() {
        document.getElementById("overlay").style.display = "none";
    }

    document.addEventListener("keydown", function(e) {
        if (e.key === "Escape") closeOverlay();
        if (e.key === "ArrowLeft") changeImage(-1);
        if (e.key === "ArrowRight") changeImage(1);
    });
</script>
