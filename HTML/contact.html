<div class="contact-wrapper">
    <div class="contact-form">
        <input type="text" id="name" name="name" placeholder="Name...">
        <input type="email" id="email" name="email" placeholder="Email...">
        <textarea id="message" name="message" placeholder="Message..."></textarea>
        <button id="sendBtn" onclick="sendEmail(event)">Send</button>
        <p id="statusMsg"></p>
    </div>
</div>

<script>
    async function sendEmail(e) {
        e.preventDefault();

        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const message = document.getElementById("message").value.trim();
        const status = document.getElementById("statusMsg");
        const btn = document.getElementById("sendBtn");

        if (!name || !email || !message) {
            status.style.color = "#ff6b6b";
            status.textContent = "Bitte alle Felder ausfüllen.";
            return;
        }

        btn.disabled = true;
        btn.textContent = "Sending...";

        const response = await fetch("https://formspree.io/f/xkoynrea", { // <-- hier deine URL
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, message })
        });

        if (response.ok) {
            status.style.color = "#6bff8e";
            status.textContent = "Nachricht gesendet!";
            document.getElementById("name").value = "";
            document.getElementById("email").value = "";
            document.getElementById("message").value = "";
        } else {
            status.style.color = "#ff6b6b";
            status.textContent = "Fehler beim Senden. Bitte nochmal versuchen.";
        }

        btn.textContent = "Send";
        btn.disabled = false;
    }
</script>

</body>
